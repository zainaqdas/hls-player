<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom HLS Player</title>
    <!-- Load the HLS.js library to play .m3u8 files -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 800px;
        }
        input {
            width: 80%;
            padding: 10px;
            margin-bottom: 10px;
            background-color: #333;
            color: white;
            border: 1px solid #555;
            border-radius: 4px;
        }
        button {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: #0056b3;
        }
        video {
            width: 100%;
            margin-top: 20px;
            background-color: #000;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Custom Video Player</h2>
        <p><i>Note: Keep your Referer Control extension ON and set to Patreon for Mux links to work.</i></p>
        
        <input type="text" id="videoUrl" placeholder="Paste your .m3u8 link here...">
        <button onclick="playVideo()">Play Video</button>

        <video id="videoPlayer" controls></video>
    </div>

    <script>
        function playVideo() {
            var url = document.getElementById('videoUrl').value;
            var video = document.getElementById('videoPlayer');

            if (!url) {
                alert("Please enter a video URL");
                return;
            }

            // Check if browser supports HLS.js
            if (Hls.isSupported()) {
                var hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play();
                });
            } 
            // Fallback for Safari (which supports HLS natively)
            else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.addEventListener('loadedmetadata', function() {
                    video.play();
                });
            } else {
                alert("Your browser does not support HLS playback.");
            }
        }
    </script>

</body>
</html>
