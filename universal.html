<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Universal Streaming Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {
    font-family: Arial;
    background: #121212;
    color: white;
    text-align: center;
    padding: 20px;
}

.container {
    max-width: 900px;
    margin: auto;
}

input, select {
    width: 80%;
    padding: 10px;
    margin: 8px;
    background: #333;
    color: white;
    border: 1px solid #555;
    border-radius: 5px;
}

button {
    padding: 10px 20px;
    background: #007bff;
    border: none;
    border-radius: 5px;
    color: white;
    cursor: pointer;
}

video {
    width: 100%;
    margin-top: 20px;
    border-radius: 10px;
}

.controls {
    margin-top: 10px;
}

.badge {
    background: #222;
    padding: 5px 10px;
    border-radius: 5px;
}
</style>
</head>

<body>

<div class="container">
    <h2>Universal Streaming Player</h2>

    <input type="text" id="url" placeholder="Paste video or .m3u8 link">

    <br>

    <button onclick="startPlayback()">Play</button>

    <div class="controls">
        <select id="quality" onchange="setQuality()">
            <option value="-1">Auto Quality</option>
        </select>

        <select onchange="setSpeed(this.value)">
            <option value="1">1x</option>
            <option value="1.25">1.25x</option>
            <option value="1.5">1.5x</option>
            <option value="2">2x</option>
        </select>
    </div>

    <video id="video" controls></video>

    <p id="status">Status: Idle</p>
</div>

<script>
let hls;

function startPlayback() {
    const url = document.getElementById("url").value.trim();
    const video = document.getElementById("video");
    const status = document.getElementById("status");
    const qualitySelect = document.getElementById("quality");

    if (!url) {
        alert("Enter a URL");
        return;
    }

    // destroy old instance
    if (hls) {
        hls.destroy();
        hls = null;
    }

    qualitySelect.innerHTML = `<option value="-1">Auto Quality</option>`;
    status.innerText = "Loading...";

    // Detect HLS
    if (url.includes(".m3u8")) {

        if (Hls.isSupported()) {

            hls = new Hls({
                maxBufferLength: 60,
                maxMaxBufferLength: 120,
                enableWorker: true
            });

            hls.loadSource(url);
            hls.attachMedia(video);

            hls.on(Hls.Events.MANIFEST_PARSED, function (event, data) {
                status.innerText = "Playing (HLS)";

                // Populate quality selector
                data.levels.forEach((level, index) => {
                    const option = document.createElement("option");
                    option.value = index;
                    option.text = level.height + "p";
                    qualitySelect.appendChild(option);
                });

                // Enforce minimum 480p
                const valid = data.levels.filter(l => l.height >= 480);
                if (valid.length) {
                    const minBitrate = Math.min(...valid.map(l => l.bitrate));
                    hls.config.minAutoBitrate = minBitrate;
                }

                video.play();
            });

            hls.on(Hls.Events.LEVEL_SWITCHED, function (event, data) {
                const level = hls.levels[data.level];
                if (level) {
                    status.innerText = `Playing ${level.height}p`;
                }
            });

            hls.on(Hls.Events.ERROR, function (event, data) {
                if (data.fatal) {
                    status.innerText = "Error occurred";
                    hls.destroy();
                }
            });

        } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
            video.src = url;
            video.play();
        }

    } else {
        // Direct video (mp4 etc)
        video.src = url;
        video.play();
        status.innerText = "Playing (Direct)";
    }
}

function setQuality() {
    const level = document.getElementById("quality").value;
    if (hls) {
        hls.currentLevel = parseInt(level);
    }
}

function setSpeed(speed) {
    document.getElementById("video").playbackRate = speed;
}
</script>

</body>
</html>
