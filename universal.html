<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamX Player</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --red: #e50914;
  --red-dim: #a0060f;
  --bg: #080808;
  --surface: #111111;
  --surface2: #1a1a1a;
  --border: rgba(255,255,255,0.07);
  --text: #f0f0f0;
  --muted: #666;
  --accent: #e50914;
  --radius: 10px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* BG grain effect */
body::before {
  content:'';
  position:fixed;
  inset:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
  pointer-events:none;
  z-index:0;
  opacity:0.4;
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 30px;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(8,8,8,0.92);
  backdrop-filter: blur(16px);
}

.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px;
  letter-spacing: 3px;
  color: var(--red);
  text-shadow: 0 0 30px rgba(229,9,20,0.4);
}

.header-meta {
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 1px;
  text-transform: uppercase;
}

/* MAIN LAYOUT */
.main {
  max-width: 980px;
  margin: 0 auto;
  padding: 30px 20px 60px;
  position: relative;
  z-index: 1;
}

/* SEARCH */
.search-wrap {
  margin-bottom: 24px;
}

.search-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--muted);
  margin-bottom: 10px;
}

.search-box {
  display: flex;
  gap: 10px;
}

.search-box input {
  flex: 1;
  padding: 14px 18px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.search-box input:focus {
  border-color: rgba(229,9,20,0.5);
  box-shadow: 0 0 0 3px rgba(229,9,20,0.08);
}

.search-box input::placeholder { color: var(--muted); }

.btn-play {
  background: var(--red);
  border: none;
  padding: 14px 26px;
  border-radius: var(--radius);
  color: white;
  font-family: 'DM Sans', sans-serif;
  font-weight: 600;
  font-size: 15px;
  cursor: pointer;
  transition: background 0.2s, transform 0.1s;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 8px;
}

.btn-play:hover { background: #c40812; }
.btn-play:active { transform: scale(0.97); }
.btn-play:disabled { background: #444; cursor: not-allowed; opacity:0.7; }

/* PLAYER */
.player-wrap {
  position: relative;
  background: #000;
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid var(--border);
  box-shadow: 0 30px 80px rgba(0,0,0,0.7);
}

video {
  width: 100%;
  display: block;
  max-height: 520px;
  background: #000;
}

/* CUSTOM CONTROLS */
.custom-controls {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  background: linear-gradient(transparent, rgba(0,0,0,0.92));
  padding: 40px 18px 14px;
  opacity: 0;
  transition: opacity 0.3s;
}

.player-wrap:hover .custom-controls,
.player-wrap.paused .custom-controls {
  opacity: 1;
}

.progress-wrap {
  position: relative;
  height: 4px;
  background: rgba(255,255,255,0.15);
  border-radius: 4px;
  margin-bottom: 12px;
  cursor: pointer;
}

.progress-bar {
  height: 100%;
  background: var(--red);
  border-radius: 4px;
  width: 0%;
  transition: height 0.1s;
  pointer-events: none;
}

.progress-wrap:hover { height: 6px; }
.progress-wrap:hover .progress-bar { height: 6px; }

.progress-thumb {
  position: absolute;
  top: 50%;
  transform: translate(-50%,-50%) scale(0);
  width: 14px;
  height: 14px;
  background: white;
  border-radius: 50%;
  pointer-events: none;
  transition: transform 0.15s;
}

.progress-wrap:hover .progress-thumb { transform: translate(-50%,-50%) scale(1); }

.ctrl-row {
  display: flex;
  align-items: center;
  gap: 12px;
}

.ctrl-btn {
  background: none;
  border: none;
  color: white;
  cursor: pointer;
  padding: 4px;
  display: flex;
  align-items: center;
  opacity: 0.85;
  transition: opacity 0.15s;
  font-size: 0;
}

.ctrl-btn:hover { opacity: 1; }

.ctrl-btn svg { width: 20px; height: 20px; }

.time-display {
  font-size: 12px;
  color: rgba(255,255,255,0.7);
  font-variant-numeric: tabular-nums;
  min-width: 90px;
}

.vol-wrap {
  display: flex;
  align-items: center;
  gap: 6px;
}

.vol-slider {
  width: 70px;
  -webkit-appearance: none;
  height: 3px;
  background: rgba(255,255,255,0.3);
  border-radius: 3px;
  outline: none;
  cursor: pointer;
}

.vol-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: white;
  cursor: pointer;
}

.ctrl-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }

.quality-mini {
  font-size: 11px;
  font-weight: 600;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.15);
  color: white;
  padding: 3px 8px;
  border-radius: 4px;
  cursor: pointer;
  outline: none;
  -webkit-appearance: none;
}

.quality-mini option { background: #111; }

/* OVERLAY SPINNER */
.spinner-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.5);
  display: none;
}

.spinner-overlay.active { display: flex; }

.spinner {
  width: 44px;
  height: 44px;
  border: 3px solid rgba(255,255,255,0.1);
  border-top-color: var(--red);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* BIG PLAY ICON */
.play-center {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
}

.play-center-icon {
  width: 70px;
  height: 70px;
  background: rgba(229,9,20,0.85);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  transform: scale(0);
  transition: transform 0.2s, opacity 0.2s;
  opacity: 0;
}

.player-wrap.paused .play-center-icon {
  transform: scale(1);
  opacity: 1;
}

/* PANEL BELOW PLAYER */
.panel {
  margin-top: 16px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

.panel-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 18px;
}

.panel-card h4 {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--muted);
  margin-bottom: 10px;
}

.status-row {
  display: flex;
  align-items: center;
  gap: 8px;
}

.status-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--muted);
  flex-shrink: 0;
}

.status-dot.live { background: #22c55e; box-shadow: 0 0 8px rgba(34,197,94,0.5); animation: pulse 2s infinite; }
.status-dot.error { background: var(--red); }
.status-dot.loading { background: #f59e0b; animation: pulse 1s infinite; }

@keyframes pulse { 0%,100%{ opacity:1; } 50%{ opacity:0.4; } }

#statusText { font-size: 13px; color: var(--text); }

.settings-row {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
}

.settings-row label {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  cursor: pointer;
  background: none;
  padding: 0;
  border: none;
  color: var(--text);
}

.toggle {
  width: 34px;
  height: 18px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 100px;
  position: relative;
  cursor: pointer;
  transition: background 0.2s;
  flex-shrink: 0;
}

.toggle input { display: none; }

.toggle::after {
  content:'';
  position: absolute;
  width: 12px;
  height: 12px;
  background: var(--muted);
  border-radius: 50%;
  top: 2px;
  left: 2px;
  transition: left 0.2s, background 0.2s;
}

.toggle.on { background: rgba(229,9,20,0.2); border-color: var(--red); }
.toggle.on::after { left: 18px; background: var(--red); }

.speed-btns {
  display: flex;
  gap: 4px;
}

.speed-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 4px 9px;
  border-radius: 5px;
  font-size: 12px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: all 0.15s;
}

.speed-btn.active, .speed-btn:hover {
  background: var(--red);
  border-color: var(--red);
  color: white;
}

/* HISTORY */
.history-section {
  margin-top: 20px;
}

.history-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}

.history-header h4 {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--muted);
}

.btn-clear {
  background: none;
  border: none;
  color: var(--muted);
  font-size: 11px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: color 0.15s;
}

.btn-clear:hover { color: var(--red); }

.history-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.history-item {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  text-align: left;
  width: 100%;
}

.history-item:hover {
  border-color: rgba(229,9,20,0.3);
  background: var(--surface2);
}

.history-icon {
  width: 28px;
  height: 28px;
  background: rgba(229,9,20,0.1);
  border: 1px solid rgba(229,9,20,0.2);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.history-info { flex: 1; min-width: 0; }
.history-url {
  font-size: 12px;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.history-time { font-size: 11px; color: var(--muted); margin-top: 2px; }

.history-del {
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  padding: 4px;
  border-radius: 4px;
  transition: color 0.15s, background 0.15s;
  flex-shrink: 0;
  display: flex;
}

.history-del:hover { color: var(--red); background: rgba(229,9,20,0.1); }

/* KEYBOARD SHORTCUTS HINT */
.shortcuts {
  margin-top: 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 18px;
}

.shortcuts h4 {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--muted);
  margin-bottom: 10px;
}

.shortcut-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 6px;
}

.shortcut-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--muted);
}

kbd {
  background: var(--surface2);
  border: 1px solid var(--border);
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 11px;
  font-family: monospace;
  color: var(--text);
  flex-shrink: 0;
}

/* TOAST */
.toast-container {
  position: fixed;
  bottom: 30px;
  right: 24px;
  z-index: 999;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.toast {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 16px;
  font-size: 13px;
  color: var(--text);
  animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards;
  max-width: 280px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.toast.error { border-color: rgba(229,9,20,0.4); }
.toast.success { border-color: rgba(34,197,94,0.4); }

@keyframes toastIn { from{ opacity:0; transform:translateY(10px); } to{ opacity:1; transform:translateY(0); } }
@keyframes toastOut { from{ opacity:1; } to{ opacity:0; transform:translateY(10px); } }

/* PiP button highlight */
.pip-active { color: var(--red) !important; }

/* STREAM INFO */
.stream-info {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  margin-top: 8px;
}

.info-badge {
  font-size: 11px;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 4px;
}

.info-badge strong { color: var(--text); }

/* FULLSCREEN styles */
.player-wrap:fullscreen,
.player-wrap:-webkit-full-screen {
  width: 100vw;
  height: 100vh;
  max-width: 100vw;
  border-radius: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  background: #000;
}

.player-wrap:fullscreen video,
.player-wrap:-webkit-full-screen video {
  width: 100%;
  height: 100%;
  max-height: 100vh;
  object-fit: contain;
}

.player-wrap:fullscreen .custom-controls,
.player-wrap:-webkit-full-screen .custom-controls {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
}

/* RESPONSIVE */
@media (max-width: 600px) {
  .panel { grid-template-columns: 1fr; }
  .header { padding: 14px 16px; }
  .main { padding: 20px 12px 50px; }
  .vol-wrap { display: none; }
  .shortcut-grid { grid-template-columns: 1fr 1fr; }
}

/* Empty state */
.history-empty {
  font-size: 13px;
  color: var(--muted);
  text-align: center;
  padding: 16px 0;
}

/* Proxy input */
.proxy-field {
  margin-top: 8px;
  display: none;
}

.proxy-field.show { display: flex; gap: 8px; }

.proxy-field input {
  flex: 1;
  padding: 8px 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 12px;
  font-family: 'DM Sans', sans-serif;
  outline: none;
}

.proxy-field input:focus { border-color: rgba(229,9,20,0.4); }
</style>
</head>
<body>

<div class="header">
  <div class="logo">StreamX</div>
  <div class="header-meta">Universal Player</div>
</div>

<div class="main">

  <!-- SEARCH -->
  <div class="search-wrap">
    <div class="search-label">Stream URL</div>
    <div class="search-box">
      <input id="urlInput" placeholder="Paste .m3u8 or .mp4 link…" autocomplete="off" spellcheck="false">
      <button class="btn-play" id="playBtn" onclick="startPlayback()">
        <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><polygon points="5,3 19,12 5,21"/></svg>
        Play
      </button>
    </div>
    <div class="proxy-field" id="proxyField">
      <input id="proxyInput" placeholder="Proxy URL e.g. https://yourworker.workers.dev/?url=" value="">
    </div>
  </div>

  <!-- PLAYER -->
  <div class="player-wrap" id="playerWrap">
    <video id="video" playsinline></video>

    <!-- Overlay: spinner -->
    <div class="spinner-overlay" id="spinnerOverlay">
      <div class="spinner"></div>
    </div>

    <!-- Big play icon when paused -->
    <div class="play-center">
      <div class="play-center-icon">
        <svg viewBox="0 0 24 24" fill="white" width="28" height="28"><polygon points="6,3 20,12 6,21"/></svg>
      </div>
    </div>

    <!-- Custom Controls -->
    <div class="custom-controls" id="customControls">
      <div class="progress-wrap" id="progressWrap">
        <div class="progress-bar" id="progressBar"></div>
        <div class="progress-thumb" id="progressThumb"></div>
      </div>
      <div class="ctrl-row">
        <button class="ctrl-btn" id="playPauseBtn" onclick="togglePlay()" title="Play/Pause (Space)">
          <svg id="playIcon" viewBox="0 0 24 24" fill="white"><polygon points="6,3 20,12 6,21"/></svg>
          <svg id="pauseIcon" viewBox="0 0 24 24" fill="white" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
        </button>

        <div class="vol-wrap">
          <button class="ctrl-btn" id="muteBtn" onclick="toggleMute()" title="Mute (M)">
            <svg id="volIcon" viewBox="0 0 24 24" fill="white"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/><path d="M15.54,8.46a5,5,0,0,1,0,7.07"/><path d="M19.07,4.93a10,10,0,0,1,0,14.14" stroke="white" stroke-width="1.5" fill="none"/></svg>
            <svg id="muteIcon" viewBox="0 0 24 24" fill="white" style="display:none"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/><line x1="23" y1="9" x2="17" y2="15" stroke="white" stroke-width="2"/><line x1="17" y1="9" x2="23" y2="15" stroke="white" stroke-width="2"/></svg>
          </button>
          <input type="range" class="vol-slider" id="volSlider" min="0" max="1" step="0.05" value="1" oninput="setVolume(this.value)">
        </div>

        <div class="time-display" id="timeDisplay">0:00 / 0:00</div>

        <div class="ctrl-right">
          <select class="quality-mini" id="qualitySelect" onchange="setQuality()" title="Quality"></select>
          <button class="ctrl-btn" id="pipBtn" onclick="togglePiP()" title="Picture in Picture (P)">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><rect x="2" y="4" width="20" height="15" rx="2"/><rect x="13" y="11" width="8" height="6" rx="1" fill="white" stroke="none"/></svg>
          </button>
          <button class="ctrl-btn" onclick="captureFrame()" title="Screenshot (S)">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
          </button>
          <button class="ctrl-btn" onclick="toggleFullscreen()" title="Fullscreen (F)">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- STREAM INFO BADGES -->
  <div class="stream-info" id="streamInfo" style="display:none">
    <div class="info-badge">Res <strong id="infoRes">—</strong></div>
    <div class="info-badge">Bitrate <strong id="infoBitrate">—</strong></div>
    <div class="info-badge">Buffer <strong id="infoBuffer">—</strong></div>
    <div class="info-badge">Type <strong id="infoType">—</strong></div>
  </div>

  <!-- PANEL -->
  <div class="panel">
    <div class="panel-card">
      <h4>Status</h4>
      <div class="status-row">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Ready to stream</span>
      </div>
    </div>
    <div class="panel-card">
      <h4>Settings</h4>
      <div class="settings-row">
        <label>
          <div class="toggle" id="proxyToggle" onclick="toggleProxy()"></div>
          Proxy
        </label>
        <label>
          <div class="toggle" id="autoRetryToggle" onclick="toggleAutoRetry()"></div>
          Auto Retry
        </label>
        <div class="speed-btns">
          <button class="speed-btn active" onclick="setSpeed(1, this)">1×</button>
          <button class="speed-btn" onclick="setSpeed(1.25, this)">1.25×</button>
          <button class="speed-btn" onclick="setSpeed(1.5, this)">1.5×</button>
          <button class="speed-btn" onclick="setSpeed(2, this)">2×</button>
        </div>
      </div>
    </div>
  </div>

  <!-- HISTORY -->
  <div class="history-section">
    <div class="history-header">
      <h4>Recent Streams</h4>
      <button class="btn-clear" onclick="clearHistory()">Clear all</button>
    </div>
    <div class="history-list" id="historyList"></div>
  </div>

  <!-- SHORTCUTS -->
  <div class="shortcuts">
    <h4>Keyboard Shortcuts</h4>
    <div class="shortcut-grid">
      <div class="shortcut-item"><kbd>Space</kbd> Play/Pause</div>
      <div class="shortcut-item"><kbd>F</kbd> Fullscreen</div>
      <div class="shortcut-item"><kbd>M</kbd> Mute</div>
      <div class="shortcut-item"><kbd>P</kbd> Picture-in-Picture</div>
      <div class="shortcut-item"><kbd>S</kbd> Screenshot</div>
      <div class="shortcut-item"><kbd>←</kbd> Seek −10s</div>
      <div class="shortcut-item"><kbd>→</kbd> Seek +10s</div>
      <div class="shortcut-item"><kbd>↑</kbd> Volume +10%</div>
      <div class="shortcut-item"><kbd>↓</kbd> Volume −10%</div>
    </div>
  </div>

</div>

<!-- TOAST -->
<div class="toast-container" id="toastContainer"></div>

<script>
// ─── STATE ───────────────────────────────────────────────────────────────
let hls = null;
let retryCount = 0;
let maxRetries = 3;
let retryTimer = null;
let isLoading = false;
let useProxy = false;
let autoRetry = true;
let currentUrl = '';

const DEFAULT_PROXY = "https://hlsplayer.dgfrii1800.workers.dev/?url=";

// ─── ELEMENTS ─────────────────────────────────────────────────────────────
const video       = document.getElementById('video');
const urlInput    = document.getElementById('urlInput');
const playBtn     = document.getElementById('playBtn');
const statusText  = document.getElementById('statusText');
const statusDot   = document.getElementById('statusDot');
const progressBar = document.getElementById('progressBar');
const progressThumb = document.getElementById('progressThumb');
const progressWrap  = document.getElementById('progressWrap');
const timeDisplay   = document.getElementById('timeDisplay');
const qualitySelect = document.getElementById('qualitySelect');
const volSlider     = document.getElementById('volSlider');
const playerWrap    = document.getElementById('playerWrap');
const spinnerOverlay = document.getElementById('spinnerOverlay');
const streamInfoEl  = document.getElementById('streamInfo');

// ─── UTILS ─────────────────────────────────────────────────────────────────
function toast(msg, type='info') {
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.innerHTML = `<span>${msg}</span>`;
  document.getElementById('toastContainer').appendChild(t);
  setTimeout(() => t.remove(), 3100);
}

function setStatus(msg, state='idle') {
  statusText.textContent = msg;
  statusDot.className = 'status-dot';
  if (state === 'live') statusDot.classList.add('live');
  if (state === 'error') statusDot.classList.add('error');
  if (state === 'loading') statusDot.classList.add('loading');
}

function formatTime(s) {
  if (!isFinite(s)) return '∞';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60).toString().padStart(2,'0');
  return `${m}:${sec}`;
}

function sanitizeUrl(url) {
  try {
    const u = new URL(url);
    if (!['http:', 'https:'].includes(u.protocol)) return null;
    return u.href;
  } catch { return null; }
}

function getProxy() {
  const custom = document.getElementById('proxyInput').value.trim();
  return custom || DEFAULT_PROXY;
}

function saveToHistory(url) {
  let hist = JSON.parse(localStorage.getItem('sx_history') || '[]');
  hist = hist.filter(h => h.url !== url);
  hist.unshift({ url, ts: Date.now() });
  hist = hist.slice(0, 10);
  localStorage.setItem('sx_history', JSON.stringify(hist));
  renderHistory();
}

function saveVolume(v) { localStorage.setItem('sx_vol', v); }
function loadVolume()  { return parseFloat(localStorage.getItem('sx_vol') || '1'); }

// ─── HISTORY RENDER ─────────────────────────────────────────────────────────
function renderHistory() {
  const list = document.getElementById('historyList');
  const hist = JSON.parse(localStorage.getItem('sx_history') || '[]');
  if (!hist.length) {
    list.innerHTML = '<div class="history-empty">No recent streams</div>';
    return;
  }
  list.innerHTML = hist.map((h, i) => {
    const d = new Date(h.ts);
    const ago = timeAgo(h.ts);
    return `
      <button class="history-item" onclick="loadFromHistory('${encodeURIComponent(h.url)}')">
        <div class="history-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#e50914" stroke-width="2" width="14" height="14"><polygon points="5,3 19,12 5,21"/></svg>
        </div>
        <div class="history-info">
          <div class="history-url">${h.url}</div>
          <div class="history-time">${ago}</div>
        </div>
        <button class="history-del" onclick="deleteHistoryItem(event, ${i})" title="Remove">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </button>`;
  }).join('');
}

function timeAgo(ts) {
  const diff = (Date.now() - ts) / 1000;
  if (diff < 60) return 'Just now';
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
  return `${Math.floor(diff/86400)}d ago`;
}

function loadFromHistory(encoded) {
  urlInput.value = decodeURIComponent(encoded);
  startPlayback();
}

function deleteHistoryItem(e, index) {
  e.stopPropagation();
  let hist = JSON.parse(localStorage.getItem('sx_history') || '[]');
  hist.splice(index, 1);
  localStorage.setItem('sx_history', JSON.stringify(hist));
  renderHistory();
}

function clearHistory() {
  localStorage.removeItem('sx_history');
  renderHistory();
  toast('History cleared');
}

// ─── PLAYBACK ─────────────────────────────────────────────────────────────
function startPlayback() {
  if (isLoading) return;
  const raw = urlInput.value.trim();
  if (!raw) { toast('Please enter a URL', 'error'); return; }

  const url = sanitizeUrl(raw);
  if (!url) { toast('Invalid or unsafe URL', 'error'); return; }

  currentUrl = url;
  retryCount = 0;
  clearTimeout(retryTimer);
  _load(url);
}

function _load(url) {
  isLoading = true;
  playBtn.disabled = true;
  setStatus('Loading…', 'loading');
  spinnerOverlay.classList.add('active');
  streamInfoEl.style.display = 'none';

  if (hls) { hls.destroy(); hls = null; }

  qualitySelect.innerHTML = '<option value="-1">Auto</option>';

  if (url.includes('.m3u8')) {
    _loadHLS(url);
  } else {
    _loadDirect(url);
  }
}

function _loadHLS(url) {
  const finalUrl = useProxy ? getProxy() + encodeURIComponent(url) : url;

  if (Hls.isSupported()) {
    hls = new Hls({
      maxBufferLength: 60,
      maxMaxBufferLength: 120,
      xhrSetup: function(xhr, originalUrl) {
        if (useProxy) {
          xhr.open('GET', getProxy() + encodeURIComponent(originalUrl), true);
        }
      }
    });

    hls.loadSource(url);
    hls.attachMedia(video);

    hls.on(Hls.Events.MANIFEST_PARSED, function(event, data) {
      data.levels.forEach((level, i) => {
        const opt = document.createElement('option');
        opt.value = i;
        opt.text = level.height ? level.height + 'p' : `Level ${i}`;
        qualitySelect.appendChild(opt);
      });

      const valid = data.levels.filter(l => l.height >= 480);
      if (valid.length) {
        hls.config.minAutoBitrate = Math.min(...valid.map(l => l.bitrate));
      }

      saveToHistory(currentUrl);
      spinnerOverlay.classList.remove('active');
      streamInfoEl.style.display = 'flex';
      document.getElementById('infoType').textContent = 'HLS';
      setStatus('Playing (HLS)', 'live');
      isLoading = false;
      playBtn.disabled = false;
      video.play().catch(() => {});
    });

    hls.on(Hls.Events.LEVEL_SWITCHED, function(event, data) {
      const lvl = hls.levels[data.level];
      if (lvl) {
        setStatus(`Playing ${lvl.height}p`, 'live');
        document.getElementById('infoRes').textContent = `${lvl.width}×${lvl.height}`;
        document.getElementById('infoBitrate').textContent = lvl.bitrate ? (lvl.bitrate/1000).toFixed(0)+'kbps' : '—';
      }
    });

    hls.on(Hls.Events.ERROR, function(event, data) {
      if (data.fatal) {
        spinnerOverlay.classList.remove('active');
        isLoading = false;
        playBtn.disabled = false;
        if (autoRetry && retryCount < maxRetries) {
          retryCount++;
          const delay = retryCount * 2000;
          setStatus(`Error — retrying in ${delay/1000}s (${retryCount}/${maxRetries})…`, 'error');
          toast(`Stream error — retry ${retryCount}/${maxRetries}`, 'error');
          retryTimer = setTimeout(() => _load(currentUrl), delay);
        } else {
          setStatus('Playback failed. Check URL or enable Proxy.', 'error');
          toast('Stream failed after retries', 'error');
        }
      }
    });

  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = finalUrl;
    video.play().catch(() => {});
    setStatus('Playing (Native HLS)', 'live');
    spinnerOverlay.classList.remove('active');
    isLoading = false;
    playBtn.disabled = false;
    saveToHistory(currentUrl);
  }
}

function _loadDirect(url) {
  video.src = url;
  video.play().then(() => {
    setStatus('Playing (Direct)', 'live');
    saveToHistory(currentUrl);
    streamInfoEl.style.display = 'flex';
    document.getElementById('infoType').textContent = 'Direct';
  }).catch(err => {
    setStatus('Playback failed', 'error');
    toast('Could not play this URL', 'error');
  }).finally(() => {
    spinnerOverlay.classList.remove('active');
    isLoading = false;
    playBtn.disabled = false;
  });
}

// ─── CONTROLS ─────────────────────────────────────────────────────────────
function togglePlay() {
  if (video.paused) video.play();
  else video.pause();
}

function toggleMute() {
  video.muted = !video.muted;
  updateMuteIcon();
}

function updateMuteIcon() {
  document.getElementById('volIcon').style.display  = video.muted ? 'none' : 'block';
  document.getElementById('muteIcon').style.display = video.muted ? 'block' : 'none';
}

function setVolume(v) {
  video.volume = v;
  video.muted = (v == 0);
  updateMuteIcon();
  saveVolume(v);
}

function setQuality() {
  if (hls) hls.currentLevel = parseInt(qualitySelect.value);
}

function setSpeed(speed, btn) {
  video.playbackRate = speed;
  document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
}

function toggleFullscreen() {
  const el = playerWrap;
  const isFs = document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement;

  if (!isFs) {
    // Enter fullscreen — try each vendor prefix
    if (el.requestFullscreen) {
      el.requestFullscreen().catch(() => tryWebkitFs(el));
    } else if (el.webkitRequestFullscreen) {
      el.webkitRequestFullscreen();
    } else if (el.mozRequestFullScreen) {
      el.mozRequestFullScreen();
    } else if (el.msRequestFullscreen) {
      el.msRequestFullscreen();
    }
  } else {
    // Exit fullscreen
    if (document.exitFullscreen) {
      document.exitFullscreen().catch(() => {});
    } else if (document.webkitExitFullscreen) {
      document.webkitExitFullscreen();
    } else if (document.mozCancelFullScreen) {
      document.mozCancelFullScreen();
    } else if (document.msExitFullscreen) {
      document.msExitFullscreen();
    }
  }
}

function tryWebkitFs(el) {
  if (el.webkitRequestFullscreen) {
    el.webkitRequestFullscreen();
  } else {
    // Last resort: expand video to fill viewport manually
    toast('Fullscreen not supported by browser', 'error');
  }
}

async function togglePiP() {
  try {
    if (document.pictureInPictureElement) {
      await document.exitPictureInPicture();
      document.getElementById('pipBtn').classList.remove('pip-active');
    } else {
      await video.requestPictureInPicture();
      document.getElementById('pipBtn').classList.add('pip-active');
      toast('Picture-in-Picture active');
    }
  } catch { toast('PiP not supported', 'error'); }
}

function captureFrame() {
  if (!video.src && !video.currentSrc) { toast('No video playing', 'error'); return; }
  const canvas = document.createElement('canvas');
  canvas.width  = video.videoWidth  || 1280;
  canvas.height = video.videoHeight || 720;
  canvas.getContext('2d').drawImage(video, 0, 0);
  const a = document.createElement('a');
  a.href = canvas.toDataURL('image/png');
  a.download = `streamx-${Date.now()}.png`;
  a.click();
  toast('Screenshot saved!', 'success');
}

// ─── PROXY & SETTINGS TOGGLES ──────────────────────────────────────────────
function toggleProxy() {
  useProxy = !useProxy;
  const t = document.getElementById('proxyToggle');
  t.classList.toggle('on', useProxy);
  document.getElementById('proxyField').classList.toggle('show', useProxy);
  if (useProxy) document.getElementById('proxyInput').value = DEFAULT_PROXY;
  toast(useProxy ? 'Proxy enabled' : 'Proxy disabled');
}

function toggleAutoRetry() {
  autoRetry = !autoRetry;
  document.getElementById('autoRetryToggle').classList.toggle('on', autoRetry);
  toast(autoRetry ? 'Auto-retry on' : 'Auto-retry off');
}

// ─── PROGRESS BAR ─────────────────────────────────────────────────────────
video.addEventListener('timeupdate', () => {
  if (!video.duration) return;
  const pct = (video.currentTime / video.duration) * 100;
  progressBar.style.width = pct + '%';
  progressThumb.style.left = pct + '%';
  timeDisplay.textContent = `${formatTime(video.currentTime)} / ${formatTime(video.duration)}`;
  // buffer info
  if (hls) {
    const buf = video.buffered.length ? (video.buffered.end(video.buffered.length-1) - video.currentTime).toFixed(1) : '0';
    document.getElementById('infoBuffer').textContent = buf + 's';
  }
});

progressWrap.addEventListener('click', e => {
  if (!video.duration) return;
  const rect = progressWrap.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  video.currentTime = pct * video.duration;
});

// drag seek
let seeking = false;
progressWrap.addEventListener('mousedown', () => seeking = true);
document.addEventListener('mousemove', e => {
  if (!seeking || !video.duration) return;
  const rect = progressWrap.getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  video.currentTime = pct * video.duration;
});
document.addEventListener('mouseup', () => seeking = false);

// ─── PLAY/PAUSE STATE ─────────────────────────────────────────────────────
video.addEventListener('play', () => {
  document.getElementById('playIcon').style.display  = 'none';
  document.getElementById('pauseIcon').style.display = 'block';
  playerWrap.classList.remove('paused');
  spinnerOverlay.classList.remove('active');
});

video.addEventListener('pause', () => {
  document.getElementById('playIcon').style.display  = 'block';
  document.getElementById('pauseIcon').style.display = 'none';
  playerWrap.classList.add('paused');
});

video.addEventListener('waiting', () => spinnerOverlay.classList.add('active'));
video.addEventListener('canplay', () => spinnerOverlay.classList.remove('active'));

// ─── KEYBOARD SHORTCUTS ────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  switch(e.code) {
    case 'Space': e.preventDefault(); togglePlay(); break;
    case 'KeyF':  toggleFullscreen(); break;
    case 'KeyM':  toggleMute(); break;
    case 'KeyP':  togglePiP(); break;
    case 'KeyS':  captureFrame(); break;
    case 'ArrowLeft':
      e.preventDefault();
      video.currentTime = Math.max(0, video.currentTime - 10);
      toast('−10s');
      break;
    case 'ArrowRight':
      e.preventDefault();
      video.currentTime = Math.min(video.duration || 0, video.currentTime + 10);
      toast('+10s');
      break;
    case 'ArrowUp':
      e.preventDefault();
      volSlider.value = Math.min(1, parseFloat(volSlider.value) + 0.1);
      setVolume(volSlider.value);
      break;
    case 'ArrowDown':
      e.preventDefault();
      volSlider.value = Math.max(0, parseFloat(volSlider.value) - 0.1);
      setVolume(volSlider.value);
      break;
  }
});

// ─── FULLSCREEN CHANGE LISTENERS ──────────────────────────────────────────
['fullscreenchange','webkitfullscreenchange','mozfullscreenchange','MSFullscreenChange'].forEach(evt => {
  document.addEventListener(evt, () => {
    const isFs = !!(document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement);
    // Update fullscreen button icon if needed
    const fsBtn = document.querySelector('.ctrl-btn[onclick="toggleFullscreen()"]');
    if (fsBtn) {
      fsBtn.title = isFs ? 'Exit Fullscreen (F)' : 'Fullscreen (F)';
      fsBtn.innerHTML = isFs
        ? `<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="10" y1="14" x2="3" y2="21"/><line x1="21" y1="3" x2="14" y2="10"/></svg>`
        : `<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>`;
    }
  });
});

// Double-click video to toggle fullscreen
video.addEventListener('dblclick', toggleFullscreen);

// ─── ENTER to play ──────────────────────────────────────────────────────────
urlInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') startPlayback();
});

// ─── INIT ─────────────────────────────────────────────────────────────────
(function init() {
  // Restore volume
  const savedVol = loadVolume();
  video.volume = savedVol;
  volSlider.value = savedVol;

  // Auto-retry is ON by default
  document.getElementById('autoRetryToggle').classList.add('on');

  // Render history
  renderHistory();

  // PiP exit listener
  video.addEventListener('leavepictureinpicture', () => {
    document.getElementById('pipBtn').classList.remove('pip-active');
  });
})();
</script>
</body>
</html>
