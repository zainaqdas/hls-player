<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom HLS Player</title>
    <!-- Load the HLS.js library to play .m3u8 files -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 800px;
        }
        input {
            width: 80%;
            padding: 10px;
            margin-bottom: 10px;
            background-color: #333;
            color: white;
            border: 1px solid #555;
            border-radius: 4px;
        }
        button {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: #0056b3;
        }
        video {
            width: 100%;
            margin-top: 20px;
            background-color: #000;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            aspect-ratio: 16/9;
        }
        #status-text {
            margin-top: 10px;
            font-size: 14px;
            color: #ff9800;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Custom Video Player</h2>
        <p><i>Cloudflare Proxy Active. Auto-quality will not drop below 480p.</i></p>
        
        <input type="text" id="videoUrl" placeholder="Paste your .m3u8 link here...">
        <button onclick="playVideo()">Play Video</button>

        <div id="status-text">Ready</div>
        <video id="videoPlayer" controls></video>
    </div>

    <script>
        const PROXY_URL = "https://hlsplayer.dgfrii1800.workers.dev/?url=";

        function playVideo() {
            var url = document.getElementById('videoUrl').value;
            var video = document.getElementById('videoPlayer');
            var status = document.getElementById('status-text');

            if (!url) {
                alert("Please enter a video URL");
                return;
            }

            // Destroy previous player instance cleanly if playing a new video
            if (window.hls) {
                window.hls.destroy();
            }

            status.innerText = "Loading video securely via proxy...";

            if (Hls.isSupported()) {
                window.hls = new Hls({
                    // This is the SAFE way to proxy requests. 
                    // It intercepts the fetch right before it happens, without breaking internal URL paths.
                    xhrSetup: function(xhr, originalUrl) {
                        xhr.open('GET', PROXY_URL + encodeURIComponent(originalUrl), true);
                    }
                });

                // Load the ORIGINAL url into HLS.js, not the proxy url.
                window.hls.loadSource(url);
                window.hls.attachMedia(video);

                window.hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    // Find the lowest quality level that is at least 480p
                    let minLevel = window.hls.levels.find(level => level.height >= 480);
                    
                    if (minLevel) {
                        // Lock the Auto-Quality algorithm to never drop below this bitrate
                        window.hls.config.minAutoBitrate = minLevel.bitrate;
                        console.log("Auto-Quality floor set to: " + minLevel.height + "p");
                    }

                    status.innerText = "Playing. Quality will adapt (Minimum 480p).";
                    video.play();
                });

                window.hls.on(Hls.Events.ERROR, function(event, data) {
                    if (data.fatal) {
                        switch (data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                console.error("Network error, trying to recover...");
                                window.hls.startLoad();
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                console.error("Media error, trying to recover...");
                                window.hls.recoverMediaError();
                                break;
                            default:
                                status.innerText = "Fatal Error encountered. Check console.";
                                console.error(data);
                                // Purposely omitted window.hls.destroy() here to prevent the TypeError crash
                                break;
                        }
                    }
                });

            } 
            else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                // Fallback for native Safari
                video.src = PROXY_URL + encodeURIComponent(url);
                video.addEventListener('loadedmetadata', function() {
                    status.innerText = "Playing in Safari Native Mode.";
                    video.play();
                });
            } else {
                alert("Your browser does not support HLS playback.");
            }
        }
    </script>

</body>
</html>
